<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuchaweb3 | Web3 & Crypto Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { font-family: 'Space Grotesk', sans-serif; transition: background 0.5s, color 0.5s; }
        
        /* Dark Theme Styles - Fully Web3 Aesthetic */
        .dark-theme { background: #020617; color: #ffffff; }
        .dark-theme .stat-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .dark-theme .secondary-text { color: rgba(148, 163, 184, 1); }

        /* Light Theme Styles */
        .light-theme { background: #f8fafc; color: #0f172a; }
        .light-theme .stat-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .light-theme .secondary-text { color: #64748b; }

        .hero-glow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100%; height: 600px; background: radial-gradient(circle, rgba(234, 179, 8, 0.1) 0%, transparent 70%); z-index: -1; }
        
        /* Fucha Brand Colors */
        .fucha-gradient { background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%); color: #000 !important; }
        .fucha-text { color: #eab308; }
        .fucha-border { border: 2.5px solid #eab308; }
        
        .premium-btn { border-radius: 14px; transition: 0.3s; font-weight: 800; display: inline-flex; align-items: center; gap: 8px; }
        .premium-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(234, 179, 8, 0.3); }
        
        .web3-tag { border: 1px solid #eab308; color: #eab308; background: rgba(234, 179, 8, 0.1); padding: 6px 20px; border-radius: 50px; font-weight: 800; font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body class="dark-theme" id="theme-body">

    <div class="hero-glow"></div>

    <nav class="sticky top-0 z-50 px-6 py-4 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#eab308] rounded-xl flex items-center justify-center font-black text-black">F</div>
                <span class="font-bold text-sm tracking-widest uppercase">Fuchaweb3</span>
            </div>
            <button onclick="toggleTheme()" class="w-12 h-12 rounded-2xl border border-gray-500/30 flex items-center justify-center hover:bg-gray-500/10 transition" id="theme-btn">
                <i class="fas fa-moon text-xl" id="theme-icon"></i>
            </button>
        </div>
    </nav>

    <header class="pt-20 pb-12 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <div class="inline-block web3-tag mb-10 uppercase">
                Bridging Web3 Language Barrier
            </div>

            <div class="relative w-48 h-48 mx-auto mb-10">
                <img src="https://unavatar.io/twitter/fuchaweb3" alt="Fuchaweb3" class="w-full h-full rounded-3xl object-cover fucha-border shadow-[0_0_40px_rgba(234,179,8,0.2)]">
            </div>

            <h1 class="text-5xl md:text-8xl font-black mb-6 tracking-tighter italic uppercase">
                Fucha <span class="fucha-text">Web3</span>
            </h1>
            
            <p class="text-lg md:text-2xl font-medium opacity-80 mb-12 max-w-3xl mx-auto leading-relaxed">
                Pushing crypto adoption to <span class="text-white font-bold underline decoration-[#eab308]">Hausa Community</span>. Building the future of finance on the Aptos Blockchain.
            </p>

            <div class="flex flex-wrap justify-center gap-6">
                <a href="https://t.me/fuchaweb3" class="fucha-gradient premium-btn px-10 py-4 shadow-xl">
                    <i class="fab fa-telegram-plane"></i> JOIN COMMUNITY
                </a>
                <a href="https://x.com/fuchaweb3" class="border-2 border-gray-500/30 px-10 py-4 rounded-2xl font-bold hover:bg-gray-500/10 transition">
                    FOLLOW ON X
                </a>
            </div>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-16">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="stat-card p-10 rounded-[32px] text-center">
                <p class="text-5xl font-black fucha-text mb-3">15.8K</p>
                <p class="text-xs uppercase tracking-[0.2em] secondary-text font-bold">X Followers</p>
            </div>
            <div class="stat-card p-10 rounded-[32px] text-center fucha-border">
                <p class="text-5xl font-black mb-3">Web3</p>
                <p class="text-xs uppercase tracking-[0.2em] secondary-text font-bold">Language Hub</p>
            </div>
            <div class="stat-card p-10 rounded-[32px] text-center">
                <p class="text-5xl font-black text-white mb-3">Aptos</p>
                <p class="text-xs uppercase tracking-[0.2em] secondary-text font-bold">Main Partner</p>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center">
        <p class="text-[10px] tracking-[0.8em] opacity-30 uppercase font-black">Crypto Awareness • Hausa Language Hub</p>
    </footer>

    <script>
        function toggleTheme() {
            const body = document.getElementById('theme-body');
            const icon = document.getElementById('theme-icon');
            
            if (body.classList.contains('dark-theme')) {
                body.classList.replace('dark-theme', 'light-theme');
                icon.classList.replace('fa-moon', 'fa-sun');
                icon.style.color = '#eab308';
            } else {
                body.classList.replace('light-theme', 'dark-theme');
                icon.classList.replace('fa-sun', 'fa-moon');
                icon.style.color = 'inherit';
            }
        }
    </script>
</body>
  </html>
